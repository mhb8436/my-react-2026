<html>
    <body>
        <script>
            const userWithAddress = {
                name: "수진", address: {
                    city: "서울", zipcode: "02123"
                }
            }

            const userNoAddress = {
                name: "민지"
            }
            console.log(userWithAddress.address.city);
            // 옵셔널 체이닝  (?.) -> 없을 수도 있는 값을 안전하게 꺼낼 때(에러없이)  
            // user.address.city 에서 처럼 . 노테이션으로 객체 깊이 들어갈때
            // 중간에 address 가 없으면 TypeError 발생하면 프로그램 중단 
            // 이를 처리하기 위해서 if 문을 쓸수도 있지만, 객체 탐색의 깊이가 길어질수록
            // if 사용하게 되면 불리해집니다.
            // user.address?.city 로 쓰게 되면 address 가 없을때 undefined 돌려주고
            // 멈추지 않습니다.

            console.log(userNoAddress.address?.city); // undefined
            // console.log(userNoAddress.address.city);
            // if(userNoAddress.address !== undefined)
            //     console.log(userNoAddress.address.city);

            const memberWithBio = {
                name: "다니엘",
                profile: {
                    bio: "카페 단골입니다."
                } 
            }
            const memberNoBio = {
                name: "혜린"
            }

            // 연습1 : 혜린의 bio를 안전하게 뽑아보세요 
            console.log(memberNoBio.profile?.bio ?? "자기소개없음")
            // ?? 널 병합  - 왼쪽 null 또는 undefined 면 오른쪽의 값을 씁니다. 
            // user.address?.city ?? "주소 없어" ->  city 없으면 주소없어 
            console.log("" ?? "빈값싫어");
            console.log(null ?? "빈값싫어");
            console.log(undefined ?? "빈값싫어");

        </script>
    </body>
</html>
