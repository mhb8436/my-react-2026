<html>
    <body>
        <script>
            const products = [
                {name:"아메리카노", price: 1500, category:"음료"},
                {name:"카페라테", price: 2000, category:"음료"},
                {name:"케이크", price: 8000, category:"디저트"},
                {name:"쿠키", price: 4500, category:"디저트"},
                {name:"밀크티", price: 5000, category:"음료"},
                {name:"수박쥬스", price: 6000, category:"쥬스"},
                {name:"오렌지쥬스", price: 4500, category:"쥬스"},
                {name:"팥빙수", price: 12000, category:"빙수"},
                {name:"망고빙수", price: 18000, category:"빙수"}
            ];

            // 1. category가 음료인 상품만 새배 열로 
            const drinks = products.filter((p)=>p.category === "음료")
            console.log(drinks)
            // 2. 각 음료의 이름만 뽑아서 새 배열로
            const drinkName = drinks.map((d)=>d.name)
            console.log(drinkName)
            // 3. 음료 가격을 하나로 모아 합계로 (초기값은 0)
            const drinkTotal = drinks.reduce((acc, cur) => acc + cur.price, 0);
            console.log(drinkTotal)
            // 4. 가격을 10%할인 가격으로 새 배열을 만들어주세요
            const discounted = products.map((p)=> {
                return {...p, price : p.price* 0.9} // 스프레드 후에 키 : 값을 넣으면 중복된 키는 값이 업데이트 
            });
            console.log(discounted)
            // 5. 디저트만 골라서 가격의 합계를 내어보세요 
            const dessertTotal = products.filter((p)=>p.category === "디저트")
                .reduce((acc, cur)=> acc + cur.price, 0); // filter 디저트를 먼저 고른후에 reduce 총합을 계산
            console.log(dessertTotal)
            // 6. 원본은 그대로 두고 메뉴에  샌드위치  추가 가격은 5500 카테고리는 식사 
            const extended = [
                ...products,
                {name: "샌드위치", price: 5500, category: "식사"}
            ]
            console.log(extended);
        </script>
    </body>
</html>
