            /**
             * 객체 - 이름표(속성들)로 값을 묶어서 두는 그릇
             * { 이름표 : 값, 이름표 : 값}
             * 배열은 번호 ( 0 , 1, 2, .. )
             * 객체는 이름표로 값을 뽑아요 
             **/
            const person1 = {
                name: "이지훈",
                age : 52,
                city : "서울"
            }
            console.log("이지훈", person1);

            console.log("이름은" , person1.name); // 객체.이름표
            console.log("이름은", person1["name"]) // 객체["이름표"]
            // 나이를 뽑아보세요
