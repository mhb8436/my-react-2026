<html>
    <body>
        <script>
            /**
             * 배열 - 값을 순서대로 담는 그릇 
             * [값1, 값2, 값3, 값4 .... ]
             * [0, 1, 2, 3.... ]
             **/
            const fruits = ["사과","바나나","포도"];
            // 사과 : 0
            // 바나나 : 1
            // 포도 : 2             
            console.log("과일목록", fruits);            
            
            // 인덱스로 값을 꺼낼 수 가 있습니다.
            console.log("1번째 값", fruits[1]); // 바나나 
            console.log("0번째 값", fruits[0]); // 사과 

            console.log("배열의 크기", fruits.length); // 배열 길이 측정 
            console.log("4번째 값: 없는값", fruits[4]); 

            // 다른 과일도 넣어볼께요 
            fruits.push("오렌지") // 배열.push 함수를 쓰면 배열에 값추가 가능
            fruits.push("앵두")
            fruits.push("오디")
            console.log(fruits)

            // fruits 배열의 마지막 요소를 보고 싶어요  6-1
            console.log(fruits[fruits.length-1]); // 배열의 갯수를 모를때 

        </script>
    </body>
</html>
