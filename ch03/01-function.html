<html>
    <body>
        <script>
            // console.log("안녕하세요 지훈님!");
            // console.log("안녕하세요 민준님!");
            // console.log("안녕하세요 수진님!");
            // console.log("안녕하세요 지안님!");
            // console.log("안녕하세요 정민님!");
            /**
             * function : 키워드 (반드시 써야함
             * greet : 함수 이름 
             * (함수내부에 전달해야 되는 값) f(x) = y  
             * {  //함수 내부에서 처리하는 로직 
             * }
             **/ 
            function greet(name) { // 함수를 정의한다. 만든다
                console.log(`안녕하세요 ${name}님`);
            }
            greet("지훈"); // 함수를 사용한다 . 호출한다 
            greet("민준");
            greet("수진");
            greet("지안");

            // 연습문제 
            // cheer 함수를 만들고 인자로 이름 (name)
            // 이 함수에서는 chear("수진")  
            // 함수에서 이걸 출력 화이팅, 수진!!
            function cheer(name) {
                console.log(`화이팅 ${name}님!!`)
            }
            cheer("혜경"); // 함수를 호출한다. 
        </script>
    </body>
</html>
