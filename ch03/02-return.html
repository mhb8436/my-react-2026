<html>
    <body>
        <script>
            /**
             * y = f(x) 
             * f : 함수 
             * x : 매개변수
             * y : 함수에서 결과로 받은값
             **/
            function greet(name)  {
                console.log(`${name}`)
                return name; // 이 값을 함수를 호출한곳에 반환
            }
            const result = greet("수진"); // y = f(x)
            // "수진" : 매개변수 -> 함수 내부에 전달하는 값
            // return name -> 함수 호출하는곳에 전달하는 값

            // console.log(result);
            function add ( a, b ) {
                return a + b;
            }

            const sum1 = add(3, 5); // sum1 = 8
            console.log(sum1)

            // multiply 함수를 만들고 a, b 를 인자로 받아서
            // 곱해서 반환해주는 함수를 만들어보세요 

        </script>
    </body>
</html>
