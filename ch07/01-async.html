<html>
    <body>
        <script>
            /**
             *  동기 vs 비동기 : 코드가 실행되는 순서 
             *  동기 : 위에서 아래로 한줄씩  수행, 앞줄이 끝나야 다음 줄 실행되는방식 
             *  비동기 : "나중에 해줘" 하고 그냥 넘어가요 -> 나중 작업이 끝나면 콜백함수 실행 
             *  setTimeout () : 매개변수로 들어간 함수(콜백)를 두번째 인자인 1000 ms (1초) 뒤에 실행 
             *  setTimtout -> 나중에 처리해주는 전담 작업자(백그라운드)
             *  setTimeout(함수, ms ) : 
             **/
            console.log("1. 첫번째 줄")
            setTimeout(()=> {
                console.log("3. setTimeout 안 "); // 비동기 로 맨 나중에 찍었어요
            }, 1000); // 1000  : 1초, 100 : 0.1 초 뒤에 setTimeout 안에 있는 함수를 찍으라는 의미입니다. 
            console.log("2. 두번째 줄");
            // 
        </script>
    </body>
</html>
