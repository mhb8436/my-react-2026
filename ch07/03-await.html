<html>
    <script>

        async function loadUser() {
            try{
                // await 이 줄이 끝날때 까지 다음줄 실행하지마 
                console.log("1");
                const response = await fetch("https://jsonplaceholder.typicode.com/users/1")
                console.log("2", response.status)
                const user = await response.json();
                console.log("3",  user);
            }catch(e){
                console.log(e);
            }            
        }

        loadUser();

    </script>
</html>
