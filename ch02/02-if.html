<html>
    <head>
        <title>if문 연습</title>
    </head>
    <body>
        <script>
            const score = 60; // 72, 60, 50
            let grade;
            console.log(grade)

            if( score >= 90 ){        
                grade = "A"
            }else if (score >= 80) {
                grade = "B"
            }else if (score >= 70) {
                grade = "C"
            }else{
                grade = "D"
            }
            console.log(grade)

        </script>
    </body>
</html>
