<html>
    <body>
        <script>
            /**
             * while 반복문을 공부합니다.
             * 
             * for(초기값; 조건; 증감값) {}
             * 
             * while(조건) {
             *  // 조건이 참일동안 반복 
             * }
             * 
             * for : 시작, 조건, 증가 가 한줄에 있고ㄱ(횟수가 정해졌을때 )
             * while : 조건 적고, 증가 반복은 직접 ( 조건이 참일 동안 무조건 돈다 )
             **/

            let i = 1; // 초기값 
            while(i <= 10) { // 조건
                console.log(i)
                i++; // 증감 
            }
            // 1부터 10까지 순차적으로 도는데 7이 되면 while 문을 빠져나오게
            let j = 1;
            while(j <= 10)  {
                if(j === 7) {
                    break;
                }
                console.log(j); // 1, 2, 3,4,5,6 
                j++;
            }
        </script>
    </body>
</html>
