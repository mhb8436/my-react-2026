             **/
            for(let i = 0; i < 10 ; i++) {
                console.log(i);                
            }
            // 1 부터 100 까지 더한 값을 알고 싶어요
            let sum = 0;
            for(let i = 1 ; i<= 100; i++){
                sum = sum + i; // sum 에 i 값을 계속 더한다
            }
            console.log(sum);

            // 1부터 10까지 더하는데 더한값이 30을 넘으면 그만두고 종료 
            let sum3 = 0
            for( let i = 1; i <= 10; i++) {
